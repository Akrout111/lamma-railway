name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Live Companion deps
        run: cd mini-services/live-companion && bun install --production

      - name: Generate Prisma client
        run: bun ./node_modules/prisma/build/index.js generate

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint
        continue-on-error: true  # warnings OK, errors fail later

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "file:./db/ci-test.db"
          SKIP_ENV_VALIDATION: "1"
